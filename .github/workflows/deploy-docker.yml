name: Deploy Backend (Docker)

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'android_app/**'
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short || true

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build Docker image
        run: docker build -t blackbugsai:latest .

      - name: Test image health
        run: |
          docker run -d --name test-container \
            -e ADMIN_TOKEN=test_token \
            -p 8080:8080 \
            blackbugsai:latest
          sleep 10
          curl -sf http://localhost:8080/api/health || echo "Health check skipped"
          docker logs test-container --tail=20
          docker stop test-container
