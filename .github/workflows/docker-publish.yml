name: Docker

on:
  schedule:
    - cron: '37 0 * * *'
  push:
    branches: [ "main" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Docker Buildx
        run: docker buildx create --use

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Extract Docker metadata
        id: meta
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE_LOWER=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          # Generate tag based on event
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            TAG="${IMAGE_LOWER}:nightly"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
            TAG="${IMAGE_LOWER}:${VERSION},${IMAGE_LOWER}:latest"
          else
            TAG="${IMAGE_LOWER}:sha-${{ github.sha }}"
          fi
          echo "tags=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE_LOWER}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          TAG_ARGS=""
          IFS=',' read -ra TAG_LIST <<< "$TAGS"
          for t in "${TAG_LIST[@]}"; do
            TAG_ARGS="$TAG_ARGS -t $t"
          done
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            docker buildx build --push $TAG_ARGS .
          else
            docker buildx build $TAG_ARGS .
          fi
