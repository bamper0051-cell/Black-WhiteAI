name: Build BlackBugsAI APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.1.0) — leave blank to just build'
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - 'android_app/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Flutter 3.24.5
        run: |
          git clone --depth 1 --branch 3.24.5 https://github.com/flutter/flutter.git "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Generate local.properties
        run: |
          echo "flutter.sdk=$HOME/flutter" > android_app/android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android_app/android/local.properties

      - name: Flutter version
        run: flutter --version

      - name: Install Flutter dependencies
        working-directory: android_app
        run: flutter pub get

      - name: Analyze code
        working-directory: android_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Debug APK
        working-directory: android_app
        run: |
          flutter build apk --debug \
            --build-name=1.1.0 \
            --build-number=${{ github.run_number }}

      - name: Build Release APK (universal)
        working-directory: android_app
        run: |
          flutter build apk --release \
            --build-name=1.1.0 \
            --build-number=${{ github.run_number }}

      - name: Build Split APKs (arm64 + arm32 + x86_64)
        working-directory: android_app
        run: |
          flutter build apk --release --split-per-abi \
            --build-name=1.1.0 \
            --build-number=${{ github.run_number }}

      - name: Collect APKs
        run: |
          mkdir -p release-apks debug-apks
          cp android_app/build/app/outputs/flutter-apk/app-release.apk \
             release-apks/BlackBugsAI-universal.apk            || true
          cp android_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             release-apks/BlackBugsAI-arm64.apk                || true
          cp android_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
             release-apks/BlackBugsAI-arm32.apk                || true
          cp android_app/build/app/outputs/flutter-apk/app-x86_64-release.apk \
             release-apks/BlackBugsAI-x86_64.apk               || true
          cp android_app/build/app/outputs/flutter-apk/app-debug.apk \
             debug-apks/BlackBugsAI-debug.apk                  || true
          echo "=== Release APKs ===" && ls -lh release-apks/ 2>/dev/null
          echo "=== Debug APK ==="    && ls -lh debug-apks/   2>/dev/null

      - name: Upload Release APKs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: BlackBugsAI-Release-APKs
          path: release-apks/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Debug APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: BlackBugsAI-Debug-APK
          path: debug-apks/
          retention-days: 14
          if-no-files-found: warn

      - name: Create GitHub Release
        if: |
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.release_tag != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          NOTES="BlackBugsAI Android App ${TAG} - Neon-styled management app for BlackBugsAI multi-agent platform."

          # Verify APK directories contain files before attempting to publish
          if [ -z "$(ls -A release-apks/ 2>/dev/null)" ]; then
            echo "::error::release-apks/ is empty — no APKs were produced."
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, uploading to existing release"
            gh release upload "$TAG" release-apks/* debug-apks/* --clobber
          else
            gh release create "$TAG" \
              --title "BlackBugsAI Android App $TAG" \
              --notes "$NOTES" \
              release-apks/* debug-apks/*
          fi
