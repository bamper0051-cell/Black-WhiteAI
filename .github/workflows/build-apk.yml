name: Build APK

on:
  push:
    branches: [ main, master, claude/*, copilot/* ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android_app/**/*.gradle.kts', 'android_app/**/*.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x android_app/gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android_app/local.properties

      - name: Build Release APK
        working-directory: android_app
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Sign APK (debug keystore)
        run: |
          APK_PATH=$(find android_app/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK found: $APK_PATH"
          cp "$APK_PATH" BlackBugsAI-admin.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: BlackBugsAI-admin-apk
          path: BlackBugsAI-admin.apk
          retention-days: 30

      - name: Create Release (on push to main/master)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat <<'EOF' > /tmp/release_notes.md
          ## BlackBugsAI Android APK

          Автосборка из коммита `${{ github.sha }}`

          ### Как установить:
          1. Скачайте `BlackBugsAI-admin.apk`
          2. Разрешите установку из неизвестных источников
          3. Установите APK
          4. Войдите через токен Telegram бота
          EOF
          gh release create "v${{ github.run_number }}" BlackBugsAI-admin.apk \
            --title "BlackBugsAI Admin v${{ github.run_number }}" \
            --notes-file /tmp/release_notes.md
