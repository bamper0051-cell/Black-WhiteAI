name: Build Android APK

on:
  push:
    branches: [ main, claude/project-setup-android-app-wyDHh ]
    paths:
      - 'android_app/**'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: false
        default: 'latest'

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Java 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter 3.24.5
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Generate local.properties
        run: |
          echo "flutter.sdk=$(which flutter | sed 's|/bin/flutter||')" \
            > android_app/android/local.properties

      - name: Install dependencies
        working-directory: android_app
        run: flutter pub get

      - name: Analyze code
        working-directory: android_app
        run: flutter analyze --no-fatal-infos || true

      - name: Build Release APK
        working-directory: android_app
        run: |
          flutter build apk --release \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}

      - name: Build Split APKs (arm64 + arm32 + x86_64)
        working-directory: android_app
        run: |
          flutter build apk --release --split-per-abi \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}

      - name: Rename APKs
        run: |
          mkdir -p release-apks
          cp android_app/build/app/outputs/flutter-apk/app-release.apk \
             release-apks/BlackBugsAI-universal.apk
          cp android_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             release-apks/BlackBugsAI-arm64.apk || true
          cp android_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
             release-apks/BlackBugsAI-arm32.apk || true
          cp android_app/build/app/outputs/flutter-apk/app-x86_64-release.apk \
             release-apks/BlackBugsAI-x86_64.apk || true
          ls -lh release-apks/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: BlackBugsAI-APKs
          path: release-apks/
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844
        with:
          tag_name: ${{ github.event.inputs.release_tag || 'latest' }}
          name: BlackBugsAI Android App ${{ github.event.inputs.release_tag || 'latest' }}
          body: |
            ## BlackBugsAI Android App

            Neon-styled management app for BlackBugsAI multi-agent platform.

            ### Download
            - **BlackBugsAI-arm64.apk** — для большинства современных Android (рекомендуется)
            - **BlackBugsAI-arm32.apk** — для старых устройств
            - **BlackBugsAI-universal.apk** — универсальный (больше размер)

            ### Установка
            1. Скачай APK под свою архитектуру
            2. Включи "Установка из неизвестных источников" в настройках Android
            3. Открой APK и установи

            ### Подключение
            1. Запусти `docker-compose up -d` на сервере
            2. Введи URL: `http://<IP>:8080`
            3. Введи `ADMIN_TOKEN` из `.env`
          files: release-apks/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
