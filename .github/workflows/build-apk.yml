name: Build APK

on:
  push:
    branches:
      - main
      - master
      - claude/*
      - copilot/*
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Cache Gradle packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android_app/**/*.gradle.kts', 'android_app/**/*.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x android_app/gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android_app/local.properties

      - name: Build Release APK
        working-directory: android_app
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Sign APK (debug keystore)
        run: |
          APK_PATH=$(find android_app/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK found: $APK_PATH"
          cp "$APK_PATH" BlackBugsAI-admin.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: BlackBugsAI-admin-apk
          path: BlackBugsAI-admin.apk
          retention-days: 30

      - name: Create Release (on push to main/master)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s\n' \
            '## BlackBugsAI Android APK' \
            '' \
            "Автосборка из коммита \`${{ github.sha }}\`" \
            '' \
            '### Как установить:' \
            '1. Скачайте `BlackBugsAI-admin.apk`' \
            '2. Разрешите установку из неизвестных источников' \
            '3. Установите APK' \
            '4. Войдите через токен Telegram бота' \
            > /tmp/release_notes.md
          gh release create "v${{ github.run_number }}" BlackBugsAI-admin.apk \
            --title "BlackBugsAI Admin v${{ github.run_number }}" \
            --notes-file /tmp/release_notes.md
