name: Build APK

on:
  push:
    branches:
      - main
      - bamper0051-cell-patch-1
      - copilot/**
    paths:
      - 'android_app/**'
  pull_request:
    paths:
      - 'android_app/**'
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Verify Flutter installation
        run: flutter --version

      - name: Generate Android native project files
        run: |
          # Create a complete Flutter project in /tmp with matching package name
          # org=com.blackbugsai + project-name=app → applicationId=com.blackbugsai.app
          flutter create --project-name app --org com.blackbugsai /tmp/flutter_template
          # Copy android directory structure, preserving existing files (--ignore-existing)
          rsync -av --ignore-existing /tmp/flutter_template/android/ \
            $GITHUB_WORKSPACE/android_app/android/
          # Ensure gradlew is executable
          chmod +x $GITHUB_WORKSPACE/android_app/android/gradlew || true

      - name: Get dependencies
        working-directory: android_app
        run: flutter pub get

      - name: Analyze code
        working-directory: android_app
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build APK (release)
        working-directory: android_app
        run: flutter build apk --release --no-obfuscate

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: blackbugsai-release-${{ github.sha }}
          path: android_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Build APK (debug)
        working-directory: android_app
        run: flutter build apk --debug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: blackbugsai-debug-${{ github.sha }}
          path: android_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
