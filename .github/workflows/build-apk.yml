name: Build Android APK

on:
  push:
    branches: [ main, claude/project-setup-android-app-wyDHh, copilot/fix-github-actions-apk-build ]
    branches: [ main, claude/project-setup-android-app-wyDHh, copilot/fix-github-actions-apk-build, claude/fix-all-bugs, copilot/fix-reference-commit-345c88a ]
    paths:
      - 'android_app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: false
        default: 'latest'

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e5ce4786f42d4d7c9e14af13c83bf9212  # v6.0.2

      - name: Setup Java 17
        uses: actions/setup-java@be666c2f9e4024b35fe9eb2a56b5d6893ece8d13  # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flutter 3.24.5
        run: |
          git clone --depth 1 --branch 3.24.5 https://github.com/flutter/flutter.git "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Generate local.properties
        run: |
          FLUTTER_SDK="${HOME}/flutter"
          echo "flutter.sdk=${FLUTTER_SDK}" > android_app/android/local.properties

      - name: Verify Flutter installation
        run: flutter --version

      - name: Install dependencies
        working-directory: android_app
        run: flutter pub get

      - name: Analyze code
        working-directory: android_app
        run: flutter analyze --no-fatal-infos || true

      - name: Build Debug APK
        working-directory: android_app
        run: |
          flutter build apk --debug \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}

      - name: Build Release APK
        working-directory: android_app
        run: |
          flutter build apk --release \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}

      - name: Build Split APKs (arm64 + arm32 + x86_64)
        working-directory: android_app
        run: |
          flutter build apk --release --split-per-abi \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}

      - name: Collect APKs
        run: |
          mkdir -p release-apks debug-apks
          cp android_app/build/app/outputs/flutter-apk/app-release.apk \
             release-apks/BlackBugsAI-universal.apk
          cp android_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             release-apks/BlackBugsAI-arm64.apk    || true
          cp android_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
             release-apks/BlackBugsAI-arm32.apk    || true
          cp android_app/build/app/outputs/flutter-apk/app-x86_64-release.apk \
             release-apks/BlackBugsAI-x86_64.apk || true
          ls -lh release-apks/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@bbbca2dd87ba6bfe12b05c2f3404c5e21ef7c1f6  # v7
             release-apks/BlackBugsAI-x86_64.apk  || true
          cp android_app/build/app/outputs/flutter-apk/app-debug.apk \
             debug-apks/BlackBugsAI-debug.apk      || true
          echo "=== Release ===" && ls -lh release-apks/
          echo "=== Debug ===" && ls -lh debug-apks/

      - name: Upload Release APKs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: BlackBugsAI-APKs
          path: release-apks/
          retention-days: 30

      - name: Upload Debug APK
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: BlackBugsAI-Debug-APK
          path: debug-apks/
          retention-days: 14

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          TAG="${TAG:-latest}"

          # Check if release already exists
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, uploading to existing release"
            gh release upload "$TAG" release-apks/* --clobber
          else
            echo "Creating new release $TAG"
            gh release create "$TAG" \
              --title "BlackBugsAI Android App $TAG" \
              --notes "## BlackBugsAI Android App
          gh release create "$TAG" \
            --title "BlackBugsAI Android App $TAG" \
            --notes "## BlackBugsAI Android App

Neon-styled management app for BlackBugsAI multi-agent platform.

### Download
- **BlackBugsAI-arm64.apk** — для большинства современных Android (рекомендуется)
- **BlackBugsAI-arm32.apk** — для старых устройств
- **BlackBugsAI-universal.apk** — универсальный (больше размер)

### Установка
1. Скачай APK под свою архитектуру
2. Включи \"Установка из неизвестных источников\" в настройках Android
3. Открой APK и установи

### Подключение
1. Запусти \`docker-compose up -d\` на сервере
2. Введи URL: \`http://<IP>:8080\`
3. Введи \`ADMIN_TOKEN\` из \`.env\`" \
              release-apks/*
          fi
            release-apks/* || true
