name: Build APK (stable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Install Flutter
        run: |
          git clone --depth 1 --branch 3.24.5 https://github.com/flutter/flutter.git "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Generate local.properties
        run: |
          echo "flutter.sdk=$HOME/flutter" > android_app/android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android_app/android/local.properties

      - name: Install Flutter dependencies
        working-directory: android_app
        run: flutter pub get

      - name: Build APK
        working-directory: android_app
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: apk
          path: android_app/build/app/outputs/flutter-apk/app-debug.apk
