name: Build APK (stable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e5ce4786f42d4d7c9e14af13c83bf9212  # v6.0.2

      - name: Setup Java
        uses: actions/setup-java@be666c2f9e4024b35fe9eb2a56b5d6893ece8d13  # v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        run: |
          git clone --depth 1 --branch 3.24.5 https://github.com/flutter/flutter.git "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Generate local.properties
        run: |
          echo "flutter.sdk=$HOME/flutter" > android_app/android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android_app/android/local.properties

      - name: Install Flutter dependencies
        working-directory: android_app
        run: flutter pub get

      - name: Build APK
        working-directory: android_app
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@bbbca2dd87ba6bfe12b05c2f3404c5e21ef7c1f6  # v7
        with:
          name: apk
          path: android_app/build/app/outputs/flutter-apk/*.apk
