name: Build APK (stable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        working-directory: android_app
        run: flutter pub get

      - name: Grant permission
        run: chmod +x ./android_app/android/gradlew

      - name: Install SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: android_app/android
        run: ./gradlew assembleDebug || ./gradlew build

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: apk
          path: android_app/**/build/outputs/apk/**/*.apk
