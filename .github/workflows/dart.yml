name: Dart

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Flutter (includes Dart SDK)
        run: |
          git clone --depth 1 --branch 3.24.5 https://github.com/flutter/flutter.git "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Generate local.properties
        run: |
          echo "flutter.sdk=$HOME/flutter" > android_app/android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android_app/android/local.properties

      - name: Install dependencies
        working-directory: android_app
        run: flutter pub get

      - name: Analyze project source
        working-directory: android_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Run tests
        working-directory: android_app
        run: flutter test || true
