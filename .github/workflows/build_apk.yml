name: Build Android APK

# Запускать сборку при каждом обновлении кода или по кнопке вручную
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Клонирование репозитория
        uses: actions/checkout@de0fac2ea7a48a5a8a7f97d93de1c8b7139aa9bc  # v6.0.2

      - name: 🐍 Настройка Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.11'

      - name: 📦 Установка библиотек
        run: |
          python -m pip install --upgrade pip
          # Устанавливаем flet и другие нужные твоему приложению пакеты
          pip install flet requests

      - name: 🛠️ Сборка Android приложения (Flet)
        # Flet сам скачает Android SDK и нужные инструменты
        run: flet build apk

      - name: 📤 Загрузка готового APK файла
        uses: actions/upload-artifact@bbbca2dd50e854b2e4b0483cb1fc2ac9aaf80f05  # v7
        with:
          name: Black-WhiteAI-App
          # Flet сохраняет готовый файл по этому пути
          path: build/apk/**/*.apk 
