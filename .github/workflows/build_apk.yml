name: Build Android APK

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Клонирование репозитория
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: ☕ Настройка Java (JDK 17)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Установка Flutter
        run: |
          git clone --depth 1 --branch 3.19.6 https://github.com/flutter/flutter.git $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: 🔧 Генерация local.properties
        run: |
          echo "flutter.sdk=$HOME/flutter" > android_app/android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android_app/android/local.properties

      - name: 📦 Получение зависимостей Flutter
        working-directory: android_app
        run: flutter pub get

      - name: 🔍 Анализ кода
        working-directory: android_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: 🛠️ Сборка Android APK (debug)
        working-directory: android_app
        run: flutter build apk --debug --verbose

      - name: 🛠️ Сборка Android APK (release)
        working-directory: android_app
        run: flutter build apk --release --no-shrink || true

      - name: 📤 Загрузка Debug APK
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: BlackBugsAI-debug
          path: android_app/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: warn

      - name: 📤 Загрузка Release APK
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: BlackBugsAI-release
          path: android_app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
