# ═══════════════════════════════════════════════════════════════════════════
# nginx.conf — BlackBugsAI v4.0 Infrastructure
#
# ARCHITECTURE:
#   Single entry point (port 80) → Tunnel points here
#
# ROUTING:
#   /api/       → Backend FastAPI (Agent Core)
#   /admin/     → Admin Panel WebUI
#   /n8n/       → n8n Workflow Automation
#   /fish/      → Fish Module (isolated)
#   /ws/        → WebSocket connections (Admin Panel)
#   /           → Admin Panel (default)
#
# FEATURES:
#   - Health checks for all services
#   - WebSocket support for real-time features
#   - Proper timeout for long-running AI tasks
#   - Gzip compression
#   - Auto-restart policy
# ═══════════════════════════════════════════════════════════════════════════

# Upstream Backend (FastAPI + Admin Web)
upstream backend_api {
    server blackbugs-backend:8080;
    keepalive 32;
}

# Upstream Fish Module
upstream fish_module {
    server blackbugs-backend:5100;
    keepalive 16;
}

# Upstream n8n
upstream n8n_service {
    server blackbugs-n8n:5678;
    keepalive 16;
}

# WebSocket upgrade handling
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Large timeouts for AI tasks
    proxy_read_timeout    900s;
    proxy_connect_timeout 60s;
    proxy_send_timeout    900s;
    send_timeout          900s;
    client_max_body_size  100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml application/atom+xml image/svg+xml
               text/x-component text/x-cross-domain-policy;
    gzip_disable "msie6";

    # ── Health Check Endpoint ─────────────────────────────────────────────
    location /health {
        proxy_pass         http://backend_api/health;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        access_log         off;
    }

    # ── n8n Workflow Automation ───────────────────────────────────────────
    location /n8n/ {
        proxy_pass         http://n8n_service/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support for n8n
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        # Increased timeouts for workflow execution
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── WebSocket (Admin Panel real-time) ─────────────────────────────────
    location /ws/ {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Socket.io Support ─────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── API Routes (FastAPI Backend) ──────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend_api/api/;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # CORS headers (if needed)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # ── Admin Panel Routes ────────────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://backend_api/admin/;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Fish Module (isolated) ────────────────────────────────────────────
    # No tunnel management from here - only through admin_web API
    location /fish/ {
        proxy_pass         http://fish_module/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Fish-Proxy true;
    }

    # ── Static Assets ─────────────────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        expires            7d;
        add_header         Cache-Control "public, immutable";
        access_log         off;
    }

    # ── Admin Panel + Default Route ───────────────────────────────────────
    location / {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Error Pages ───────────────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        return 503 '{"error": "Service temporarily unavailable. Please try again later."}';
        add_header Content-Type application/json;
    }
}
