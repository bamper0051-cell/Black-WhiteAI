# ═══════════════════════════════════════════════════════════════════════════
# nginx.conf — BlackBugsAI v3
# Единственная точка входа. Туннель указывает СЮДА (порт 80).
# Маршрутизация:
#   /          → admin_web:8080  (Admin Panel v4)
#   /fish/     → blackbugs:5100  (Fish Module — изолирован)
#   /ws/admin  → admin_web:8080  (WebSocket Real-time)
# ═══════════════════════════════════════════════════════════════════════════

upstream admin_backend {
    server blackbugs-main:8080;
    keepalive 32;
}

upstream fish_backend {
    server blackbugs-main:5100;
    keepalive 16;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Большой timeout для AI задач
    proxy_read_timeout    600s;
    proxy_connect_timeout 30s;
    proxy_send_timeout    600s;
    send_timeout          600s;

    # Gzip
    gzip on;
    gzip_types text/plain application/json text/html text/css application/javascript;

    # ── WebSocket (Admin Panel real-time) ─────────────────────────────────
    location /ws/ {
        proxy_pass         http://admin_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    location /socket.io/ {
        proxy_pass         http://admin_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }

    # ── Fish Module — изолирован на /fish/ ───────────────────────────────
    # Никаких туннелей отсюда — только через admin_web API
    location /fish/ {
        proxy_pass         http://fish_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Fish-Proxy true;  # fish_web.py может проверять
    }

    # ── REST API — explicit block for APK/mobile clients ─────────────────
    # APK connects to baseUrl/api/* (no direct port — always through nginx)
    location /api/ {
        proxy_pass         http://admin_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Admin Panel + все остальные маршруты ─────────────────────────────
    location / {
        proxy_pass         http://admin_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Статика ───────────────────────────────────────────────────────────
    location ~* \.(css|js|png|ico|woff2?)$ {
        proxy_pass http://admin_backend;
        expires 1h;
        add_header Cache-Control "public";
    }
}
