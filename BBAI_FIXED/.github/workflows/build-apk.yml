name: Build BlackBugsAI APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.1.0) — leave blank to just build'
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - 'android_app/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1 ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2 ── Java ────────────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 3 ── Flutter (official action, most reliable) ─────────────────────
      - name: Setup Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      # 4 ── Verify Flutter ─────────────────────────────────────────────────
      - name: Flutter version
        run: flutter --version

      # 5 ── Install deps ────────────────────────────────────────────────────
      - name: Install Flutter dependencies
        working-directory: android_app
        run: flutter pub get

      # 6 ── Analyze (non-fatal) ─────────────────────────────────────────────
      - name: Analyze code
        working-directory: android_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      # 7 ── local.properties ───────────────────────────────────────────────
      - name: Generate local.properties
        run: |
          FLUTTER_SDK=$(which flutter | sed 's|/bin/flutter||')
          echo "flutter.sdk=${FLUTTER_SDK}" > android_app/android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT"  >> android_app/android/local.properties

      # 8 ── Build Debug APK ─────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: android_app
        run: |
          flutter build apk --debug \
            --build-name=1.1.0 \
            --build-number=${{ github.run_number }}

      # 9 ── Build Release APK (universal) ───────────────────────────────────
      - name: Build Release APK (universal)
        working-directory: android_app
        run: |
          flutter build apk --release \
            --build-name=1.1.0 \
            --build-number=${{ github.run_number }}

      # 10 ── Build Split APKs ────────────────────────────────────────────────
      - name: Build Split APKs (arm64 + arm32 + x86_64)
        working-directory: android_app
        run: |
          flutter build apk --release --split-per-abi \
            --build-name=1.1.0 \
            --build-number=${{ github.run_number }}

      # 11 ── Collect into output folders ────────────────────────────────────
      - name: Collect APKs
        run: |
          mkdir -p release-apks debug-apks

          # Release APKs
          cp android_app/build/app/outputs/flutter-apk/app-release.apk \
             release-apks/BlackBugsAI-universal.apk            || true
          cp android_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             release-apks/BlackBugsAI-arm64.apk                || true
          cp android_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
             release-apks/BlackBugsAI-arm32.apk                || true
          cp android_app/build/app/outputs/flutter-apk/app-x86_64-release.apk \
             release-apks/BlackBugsAI-x86_64.apk               || true

          # Debug APK
          cp android_app/build/app/outputs/flutter-apk/app-debug.apk \
             debug-apks/BlackBugsAI-debug.apk                  || true

          echo "=== Release APKs ===" && ls -lh release-apks/ 2>/dev/null
          echo "=== Debug APK ==="    && ls -lh debug-apks/   2>/dev/null

      # 12 ── Upload Release APKs ──────────────────────────────────────────
      - name: Upload Release APKs
        uses: actions/upload-artifact@v4
        with:
          name: BlackBugsAI-Release-APKs
          path: release-apks/
          retention-days: 30
          if-no-files-found: warn

      # 13 ── Upload Debug APK ──────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BlackBugsAI-Debug-APK
          path: debug-apks/
          retention-days: 14
          if-no-files-found: warn

      # 14 ── Create GitHub Release (only on manual trigger with tag) ────────
      - name: Create GitHub Release
        if: |
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.release_tag != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          gh release create "$TAG" \
            --title "BlackBugsAI Android App $TAG" \
            --notes "## BlackBugsAI Android App $TAG

Neon-styled management app for BlackBugsAI multi-agent platform.

### Что нового
- Добавлены агенты: ANDERSON · PYTHIA · TANKER · OPERATOR
- Исправлена аутентификация (Bearer token + X-Admin-Token)
- Исправлен settings_screen (дублированный dispose)
- Шрифты через Google Fonts (не нужны файлы)
- Demo mode работает без сервера

### Скачать APK
| Файл | Для кого |
|---|---|
| **BlackBugsAI-arm64.apk** | Большинство современных телефонов (рекомендуется) |
| **BlackBugsAI-arm32.apk** | Старые устройства |
| **BlackBugsAI-universal.apk** | Универсальный (больше размер) |
| **BlackBugsAI-debug.apk** | Для отладки |

### Установка
1. Скачай APK под свою архитектуру
2. Настройки Android → Безопасность → Разрешить установку из неизвестных источников
3. Открой APK и установи

### Подключение к серверу
1. Запусти: \`docker compose up -d\`
2. В приложении введи URL: \`http://<IP>:8080\`
3. Введи ADMIN_WEB_TOKEN из \`.env\`" \
            release-apks/* debug-apks/* || true
