name: blackbugsai
description: BlackBugsAI — Multi-Agent AI Platform Control App
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & WebSocket
  http: ^1.1.0
  web_socket_channel: ^2.4.0

  # UI / Animations
  flutter_animate: ^4.3.0
  fl_chart: ^0.65.0

  # Fonts (via Google Fonts — no local files needed)
  google_fonts: ^6.1.0

  # Icons
  font_awesome_flutter: ^10.6.0

  # Storage
  shared_preferences: ^2.2.2

  # Utils
  intl: ^0.18.1
  url_launcher: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/

  # NOTE: Fonts are loaded via google_fonts package — no local font files needed
  # Orbitron and JetBrains Mono are available through Google Fonts
