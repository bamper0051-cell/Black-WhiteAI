name: blackbugsai
description: BlackBugsAI — Multi-Agent AI Platform Control App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & WebSocket
  http: ^1.1.0
  web_socket_channel: ^2.4.0
  dio: ^5.3.2

  # State management
  provider: ^6.1.1
  riverpod: ^2.4.5
  flutter_riverpod: ^2.4.5

  # UI / Animations
  flutter_animate: ^4.3.0
  lottie: ^3.0.0
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.2
  fl_chart: ^0.65.0
  percent_indicator: ^4.2.3
  glassmorphism: ^3.0.0

  # Navigation
  go_router: ^12.1.3

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Utils
  intl: ^0.18.1
  timeago: ^3.6.0
  url_launcher: ^6.2.1
  share_plus: ^7.2.1
  path_provider: ^2.1.1
  open_filex: ^4.3.4

  # Icons
  flutter_svg: ^2.0.9
  font_awesome_flutter: ^10.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
