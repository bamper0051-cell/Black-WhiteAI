# ═══════════════════════════════════════════════════════════════════════════
# BlackBugsAI — Docker Compose v3.0 (PRODUCTION)
# 
# АРХИТЕКТУРА:
#   nginx:80 → admin_web:8080  (/)
#   nginx:80 → fish_web:5100   (/fish/*)   ← изолирован, нет конфликта туннелей
#   Один туннель → nginx:80
#
# ЗАПУСК:
#   cp .env.example .env && nano .env
#   docker compose -f docker-compose.v3.yml up -d
#
# GCP SSH:
#   bash deploy_gcp.sh
# ═══════════════════════════════════════════════════════════════════════════


services:

  # ── Nginx — единственная точка входа ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: blackbugs-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      blackbugs:
        condition: service_healthy
    networks:
      - blackbugs-net
    logging: &log-opts
      driver: "json-file"
      options: {max-size: "20m", max-file: "3"}

  # ── BlackBugsAI Main ─────────────────────────────────────────────────────
  blackbugs:
    build:
      context: .
      dockerfile: Dockerfile.v3
    image: blackbugsai:v3
    container_name: blackbugs-main
    restart: unless-stopped

    environment:
      # ── Telegram ──────────────────────────────────────────────────────────
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}

      # ── LLM ───────────────────────────────────────────────────────────────
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - LLM_MODEL=${LLM_MODEL:-deepseek-coder}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

      # ── Admin Panel ───────────────────────────────────────────────────────
      - ADMIN_WEB_PORT=8080
      - ADMIN_WEB_TOKEN=${ADMIN_WEB_TOKEN:?ADMIN_WEB_TOKEN required}
      - SECRET_KEY=${SECRET_KEY:-blackbugs_change_in_prod}

      # ── Fish module ───────────────────────────────────────────────────────
      # Fish слушает на 5100 (НЕ 5000!), nginx проксирует /fish/*
      # TUNNEL управляется ТОЛЬКО admin_web — у fish нет прав на tunnel!
      - FISH_SERVER_PORT=5100
      - FISH_TUNNEL_DISABLED=true   # ← Ключевой фикс конфликта

      # ── Tunnel ────────────────────────────────────────────────────────────
      - TUNNEL_PROVIDER=${TUNNEL_PROVIDER:-cloudflared}
      - TUNNEL_TARGET_PORT=80       # ← Туннель → nginx, не напрямую на 8080
      - AUTO_TUNNEL=${AUTO_TUNNEL:-false}
      - BORE_SERVER=${BORE_SERVER:-bore.pub}

      # ── TTS ───────────────────────────────────────────────────────────────
      - TTS_PROVIDER=${TTS_PROVIDER:-edge}
      - TTS_VOICE=${TTS_VOICE:-ru-RU-DmitryNeural}

      # ── Misc ──────────────────────────────────────────────────────────────
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-UTC}

    # Порты только для debug — в prod nginx → container
    expose:
      - "8080"   # Admin
      - "5100"   # Fish (только internal)

    # Прямой доступ к admin если nginx не нужен
    ports:
      - "${ADMIN_DIRECT_PORT:-8080}:8080"

    volumes:
      - blackbugs-data:/app/data
      - blackbugs-matrix:/app/matrix_workspace
      - blackbugs-neo:/app/neo_workspace
      - blackbugs-fish:/app/fish_data
      - blackbugs-logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro  # для docker-in-docker тулзов

    networks:
      - blackbugs-net

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 20s
      timeout: 8s
      start_period: 30s
      retries: 5

    logging: *log-opts

  # ── Watchtower — авто-обновление образа ─────────────────────────────────
  # watchtower:
  #   image: containrrr/watchtower
  #   container_name: blackbugs-watcher
  #   restart: unless-stopped
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   command: --interval 3600 --cleanup blackbugs-main
  #   networks: [blackbugs-net]

# ── Networks ──────────────────────────────────────────────────────────────
networks:
  blackbugs-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

# ── Volumes ───────────────────────────────────────────────────────────────
volumes:
  blackbugs-data:    {name: blackbugs-data}
  blackbugs-matrix:  {name: blackbugs-matrix}
  blackbugs-neo:     {name: blackbugs-neo}
  blackbugs-fish:    {name: blackbugs-fish}
  blackbugs-logs:    {name: blackbugs-logs}
