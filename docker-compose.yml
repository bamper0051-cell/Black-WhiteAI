# ═══════════════════════════════════════════════════════════════════════════
# BlackBugsAI — Docker Compose Infrastructure v4.0
#
# ARCHITECTURE:
#   nginx:80 → FastAPI Backend (Agent Core) + Admin WebUI + n8n
#   PostgreSQL → Persistence Layer
#   Redis → State Management & Task Queue
#   Telegram Bot → Wrapped as Separate Service
#
# ROUTES:
#   /           → Admin Panel & API
#   /api/       → FastAPI Backend (Agent Core)
#   /admin/     → Admin WebUI
#   /n8n/       → n8n Workflow Automation
#   /fish/      → Fish Module (isolated)
#
# STARTUP:
#   cp .env.example .env && nano .env
#   docker compose up -d
#
# GCP DEPLOYMENT:
#   bash deploy_gcp.sh
# ═══════════════════════════════════════════════════════════════════════════

version: '3.8'

services:

  # ── PostgreSQL — Persistence Database ─────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: blackbugs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blackbugsai}
      POSTGRES_USER: ${POSTGRES_USER:-blackbugs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - blackbugs-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blackbugs} -d ${POSTGRES_DB:-blackbugsai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: &log-opts
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── Redis — State & Queue Management ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: blackbugs-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-CHANGE_ME_redis_password}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - blackbugs-net
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging: *log-opts

  # ── FastAPI Backend — Agent Core ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.v3
    image: blackbugsai:v3
    container_name: blackbugs-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # ── Database ──────────────────────────────────────────────────────────
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-blackbugsai}
      - POSTGRES_USER=${POSTGRES_USER:-blackbugs}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}

      # ── Redis ─────────────────────────────────────────────────────────────
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-CHANGE_ME_redis_password}

      # ── Telegram ──────────────────────────────────────────────────────────
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - ADMIN_IDS=${ADMIN_IDS:-123456789}

      # ── LLM ───────────────────────────────────────────────────────────────
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - LLM_MODEL=${LLM_MODEL:-deepseek-coder}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}

      # ── Admin Panel ───────────────────────────────────────────────────────
      - ADMIN_WEB_PORT=8080
      - ADMIN_WEB_TOKEN=${ADMIN_WEB_TOKEN:?ADMIN_WEB_TOKEN required}
      - SECRET_KEY=${SECRET_KEY:-blackbugs_change_in_prod}
      - JWT_SECRET=${JWT_SECRET:-change_me_to_another_long_random_string}

      # ── Fish Module ───────────────────────────────────────────────────────
      - FISH_SERVER_PORT=5100
      - FISH_TUNNEL_DISABLED=true

      # ── Tunnel ────────────────────────────────────────────────────────────
      - TUNNEL_PROVIDER=${TUNNEL_PROVIDER:-cloudflared}
      - TUNNEL_TARGET_PORT=80
      - AUTO_TUNNEL=${AUTO_TUNNEL:-false}

      # ── TTS ───────────────────────────────────────────────────────────────
      - TTS_PROVIDER=${TTS_PROVIDER:-edge}
      - TTS_VOICE=${TTS_VOICE:-ru-RU-DmitryNeural}

      # ── Misc ──────────────────────────────────────────────────────────────
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-UTC}

    expose:
      - "8080"   # Admin Panel & API
      - "5100"   # Fish Module

    volumes:
      - blackbugs-data:/app/data
      - blackbugs-matrix:/app/matrix_workspace
      - blackbugs-neo:/app/neo_workspace
      - blackbugs-fish:/app/fish_data
      - blackbugs-logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - blackbugs-net

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 20s
      timeout: 8s
      start_period: 30s
      retries: 5

    logging: *log-opts

  # ── Telegram Bot — Isolated Service ───────────────────────────────────────
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.v3
    image: blackbugsai:v3
    container_name: blackbugs-telegram-bot
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python bot_main.py
    environment:
      # Inherit all env vars from backend
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-blackbugsai}
      - POSTGRES_USER=${POSTGRES_USER:-blackbugs}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-CHANGE_ME_redis_password}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - ADMIN_IDS=${ADMIN_IDS:-123456789}
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - LLM_MODEL=${LLM_MODEL:-deepseek-coder}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - BACKEND_URL=http://backend:8080
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-UTC}

    volumes:
      - blackbugs-data:/app/data
      - blackbugs-logs:/app/logs

    networks:
      - blackbugs-net

    logging: *log-opts

  # ── n8n — Workflow Automation ─────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: blackbugs-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - N8N_PROTOCOL=http
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PATH=/n8n/
      - WEBHOOK_URL=http://localhost/n8n/
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:?N8N_BASIC_AUTH_PASSWORD required}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-blackbugsai}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-blackbugs}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      - DB_POSTGRESDB_SCHEMA=n8n
      - GENERIC_TIMEZONE=${TZ:-UTC}
      - TZ=${TZ:-UTC}

    expose:
      - "5678"

    volumes:
      - n8n-data:/home/node/.n8n

    networks:
      - blackbugs-net

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging: *log-opts

  # ── Nginx — Reverse Proxy ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: blackbugs-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      n8n:
        condition: service_healthy
    networks:
      - blackbugs-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *log-opts

# ── Networks ──────────────────────────────────────────────────────────────
networks:
  blackbugs-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

# ── Volumes ───────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    name: blackbugs-postgres-data
  redis-data:
    name: blackbugs-redis-data
  blackbugs-data:
    name: blackbugs-data
  blackbugs-matrix:
    name: blackbugs-matrix
  blackbugs-neo:
    name: blackbugs-neo
  blackbugs-fish:
    name: blackbugs-fish
  blackbugs-logs:
    name: blackbugs-logs
  n8n-data:
    name: blackbugs-n8n-data
